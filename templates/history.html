{% extends 'base.html' %}

{% block content %}

<h4 class="fw-bold mb-4">Check-in Luggage History</h4>

<div class="card shadow p-4">

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Flight Number</th>
                <th>Destination</th>
                <th>Baggage ID</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for item in data %}
            <tr>
                <td>{{item.flight}}</td>
                <td>{{item.destination}}</td>
                <td>{{item.bag_id}}</td>

                <td>
                    <a href="/delete/{{item._id}}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Delete this record?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
