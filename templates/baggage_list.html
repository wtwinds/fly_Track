{% extends 'base.html' %}

{% block content %}

<h4 class="fw-bold mb-4">Flightwise Baggage List</h4>

<div class="card shadow p-3">

    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Flight Number</th>
                <th>Destination</th>
                <th>Total Bags</th>
            </tr>
        </thead>

        <tbody>
            {% for item in data %}
            <tr>
                <td>{{item.flight}}</td>
                <td>{{item.destination}}</td>
                <td>{{item.total_bags}}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
