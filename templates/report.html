{% extends 'base.html' %}

{% block content %}

<h4 class="fw-bold mb-4">Report Lost Baggage</h4>

<div class="row">
    <div class="col-md-6">

        <form method="POST">

            <div class="mb-3">
                <label>Passenger Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Baggage ID</label>
                <input type="text" name="bag_id" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Flight Number</label>
                <input type="text" name="flight" class="form-control" placeholder="EX:AI202" required>
            </div>

            <div class="mb-3">
                <label>Description (Color, Type, Brand)</label>
                <input type="text" name="description" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" name="contact" class="form-control" required>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-danger px-5">Submit Report</button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
