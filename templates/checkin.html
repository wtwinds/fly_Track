{% extends 'base.html' %}
{% block content %}

<h4 class="fw-bold mb-4">Check-in Luggage</h4>

<div class="row">

    <!-- LEFT FORM -->
    <div class="col-md-6">
        <form method="POST">

            <!-- PNR -->
            <div class="mb-3">
                <label>PNR Number</label>
                <input type="text" id="pnr" name="pnr" class="form-control" onblur="fetchPNR()" required />
            </div>

            <!-- Auto Fill -->
            <div class="mb-3">
                <label>Passenger Name</label>
                <input type="text" id="name" name="name" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Flight Number</label>
                <input type="text" id="flight" name="flight" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Destination</label>
                <input type="text" id="destination" name="destination" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" id="contact" name="contact" class="form-control" required />
            </div>

            <!-- BAG COUNT -->
            <div class="mb-3">
                <label>Number of Bags</label>
                <input type="number" id="bags" name="bags" class="form-control" min="1" max="2"
                    onchange="generateWeightFields()" required />
            </div>

            <!-- Dynamic weight fields -->
            <div id="weightFields"></div>

            <!-- TOTAL -->
            <div class="mb-3">
                <label>Total Weight</label>
                <input type="number" id="totalWeight" name="weight" class="form-control" readonly required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button type="reset" class="btn btn-secondary" onclick="clearForm()">Reset</button>
                <button class="btn btn-primary">Generate Bag Tag</button>
            </div>

        </form>
    </div>

    <!-- RIGHT SIDE PNR LIST -->
    <div class="col-md-6">
        <h6 class="fw-bold mb-3">Available PNR Numbers</h6>

        <div class="card p-3 shadow-sm" style="max-height: 300px; overflow-y:auto;">
            {% for pnr in pnr_list %}
            <div class="border-bottom py-1">{{pnr}}</div>
            {% endfor %}
        </div>
    </div>

</div>

{% endblock %}
